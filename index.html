<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindle Clock</title>
  <style type="text/css">
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    table.page {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
    }

    td.center {
      text-align: center;
      vertical-align: middle;
      padding: 20px;
    }

    #clock {
      font-size: 112px;
      line-height: 1.1;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #date {
      margin-top: 28px;
      font-size: 38px;
      line-height: 1.3;
      font-weight: bold;
    }

    #footer {
      margin-top: 70px;
      font-size: 22px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <table class="page" summary="">
    <tr>
      <td class="center">
        <div id="clock">--:--</div>
        <div id="date">Loading date</div>
        <div id="footer">Kindle Clock</div>
      </td>
    </tr>
  </table>

  <script type="text/javascript">
    var USE_MANUAL_OFFSET = false;
    var MANUAL_UTC_OFFSET_HOURS = 2;

    function pad(number) {
      if (number < 10) {
        return "0" + number;
      }
      return "" + number;
    }

    function getCurrentDate() {
      var now = new Date();

      if (USE_MANUAL_OFFSET) {
        return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (MANUAL_UTC_OFFSET_HOURS * 3600000));
      }

      return now;
    }

    function updateClock() {
      var now = getCurrentDate();
      var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      var hours = now.getHours();
      var minutes = now.getMinutes();
      var dateText = days[now.getDay()] + ", " + months[now.getMonth()] + " " + now.getDate() + ", " + now.getFullYear();

      document.getElementById("clock").innerHTML = pad(hours) + ":" + pad(minutes);
      document.getElementById("date").innerHTML = dateText;
    }

    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
