<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindle Clock</title>
  <style type="text/css">
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    table.page {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
    }

    td.center {
      text-align: center;
      vertical-align: middle;
      padding: 16px 34px;
    }

    #clock {
      font-size: 112px;
      line-height: 1.1;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #date {
      margin-top: 28px;
      font-size: 38px;
      line-height: 1.3;
      font-weight: bold;
    }

    #lunar {
      margin-top: 18px;
      font-size: 30px;
      line-height: 1.3;
      font-weight: bold;
    }

    table.worldClocks {
      margin: 22px auto 0 auto;
      width: 92%;
      border-collapse: collapse;
    }

    table.worldClocks td {
      width: 50%;
      text-align: center;
      vertical-align: top;
      padding: 0 8px;
    }

    .worldLabel {
      font-size: 20px;
      line-height: 1.2;
      font-weight: bold;
    }

    .worldTime {
      margin-top: 4px;
      font-size: 34px;
      line-height: 1.1;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #message,
    #weather {
      margin: 22px auto 0 auto;
      width: 92%;
      font-size: 24px;
      line-height: 1.2;
      font-weight: bold;
      white-space: pre-line;
    }

    #settingsLink {
      margin-top: 32px;
      font-size: 22px;
      line-height: 1.3;
    }

    #settingsLink a {
      color: #000;
      text-decoration: underline;
    }

    #settingsPanel {
      display: none;
      margin: 22px auto 0 auto;
      width: 88%;
      max-width: 660px;
      text-align: left;
      font-size: 22px;
      line-height: 1.3;
    }

    #settingsPanel label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    #settingsPanel textarea,
    #settingsPanel input {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 22px;
    }

    #settingsPanel textarea {
      height: 90px;
    }

    #settingsPanel button {
      margin-top: 14px;
      margin-right: 8px;
      padding: 8px 14px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 22px;
      font-weight: bold;
    }

    #footer {
      margin-top: 46px;
      font-size: 22px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <table class="page" summary="">
    <tr>
      <td class="center">
        <div id="clock">--:--</div>
        <div id="date">Loading date</div>
        <div id="lunar">Loading lunar date</div>
        <table class="worldClocks" summary="">
          <tr>
            <td>
              <div class="worldLabel" id="worldOneLabel">Beijing</div>
              <div class="worldTime" id="worldOneTime">--:--</div>
            </td>
            <td>
              <div class="worldLabel" id="worldTwoLabel">Central America</div>
              <div class="worldTime" id="worldTwoTime">--:--</div>
            </td>
          </tr>
        </table>
        <div id="message"></div>
        <div id="weather"></div>
        <div id="settingsLink"><a href="#" onclick="showSettings(); return false;">Settings</a></div>
        <div id="settingsPanel">
          <label for="messageInput">Note</label>
          <textarea id="messageInput" rows="3" cols="30"></textarea>
          <label for="weatherLocationInput">Weather location</label>
          <input id="weatherLocationInput" type="text" value="">
          <label for="weatherInput">Manual weather fallback</label>
          <input id="weatherInput" type="text" value="">
          <button type="button" onclick="saveSettings();">Save</button>
          <button type="button" onclick="hideSettings();">Cancel</button>
          <button type="button" onclick="clearSettings();">Clear</button>
        </div>
        <div id="footer">Kindle Clock</div>
      </td>
    </tr>
  </table>

  <script type="text/javascript">
    var USE_MANUAL_OFFSET = true;
    var MANUAL_UTC_OFFSET_HOURS = 2;
    var WORLD_CLOCK_ONE_LABEL = "Beijing";
    var WORLD_CLOCK_ONE_UTC_OFFSET_HOURS = 8;
    var WORLD_CLOCK_TWO_LABEL = "Central America";
    var WORLD_CLOCK_TWO_UTC_OFFSET_HOURS = -6;
    var CUSTOM_MESSAGE = "";
    var WEATHER_TEXT = "";
    var WEATHER_LOCATION = "";
    var WEATHER_CACHE_TEXT = "";
    var WEATHER_CACHE_TIME = 0;
    var WEATHER_CACHE_QUERY = "";
    var WEATHER_LOADING = false;
    var WEATHER_REFRESH_MS = 1800000;
    var storageWorks = true;

    function escapeHtml(text) {
      return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function encodeCookieValue(value) {
      return encodeURIComponent(value).replace(/%20/g, "+");
    }

    function decodeCookieValue(value) {
      return decodeURIComponent(String(value).replace(/\+/g, "%20"));
    }

    function setCookie(name, value) {
      var date = new Date();
      date.setTime(date.getTime() + (3650 * 24 * 60 * 60 * 1000));
      document.cookie = name + "=" + encodeCookieValue(value) + "; expires=" + date.toUTCString() + "; path=/";
    }

    function getCookie(name) {
      var i;
      var part;
      var nameEq = name + "=";
      var parts = document.cookie.split(";");

      for (i = 0; i < parts.length; i = i + 1) {
        part = parts[i];
        while (part.charAt(0) === " ") {
          part = part.substring(1, part.length);
        }
        if (part.indexOf(nameEq) === 0) {
          return decodeCookieValue(part.substring(nameEq.length, part.length));
        }
      }

      return "";
    }

    function saveValue(name, value) {
      if (storageWorks && window.localStorage) {
        try {
          window.localStorage.setItem(name, value);
          return;
        } catch (error) {
          storageWorks = false;
        }
      }

      setCookie(name, value);
    }

    function loadValue(name, fallback) {
      var value;

      if (storageWorks && window.localStorage) {
        try {
          value = window.localStorage.getItem(name);
          if (value !== null) {
            return value;
          }
        } catch (error) {
          storageWorks = false;
        }
      }

      value = getCookie(name);
      if (value !== "") {
        return value;
      }

      return fallback;
    }

    function loadSettings() {
      CUSTOM_MESSAGE = loadValue("kindleClockMessage", CUSTOM_MESSAGE);
      WEATHER_TEXT = loadValue("kindleClockWeather", WEATHER_TEXT);
      WEATHER_LOCATION = loadValue("kindleClockWeatherLocation", WEATHER_LOCATION);
      WEATHER_CACHE_TEXT = loadValue("kindleClockWeatherCacheText", WEATHER_CACHE_TEXT);
      WEATHER_CACHE_QUERY = loadValue("kindleClockWeatherCacheQuery", WEATHER_CACHE_QUERY);
      WEATHER_CACHE_TIME = parseInt(loadValue("kindleClockWeatherCacheTime", "0"), 10);
      if (isNaN(WEATHER_CACHE_TIME)) {
        WEATHER_CACHE_TIME = 0;
      }
    }

    function showSettings() {
      document.getElementById("messageInput").value = CUSTOM_MESSAGE;
      document.getElementById("weatherInput").value = WEATHER_TEXT;
      document.getElementById("weatherLocationInput").value = WEATHER_LOCATION;
      document.getElementById("settingsPanel").style.display = "block";
    }

    function hideSettings() {
      document.getElementById("settingsPanel").style.display = "none";
    }

    function saveSettings() {
      CUSTOM_MESSAGE = document.getElementById("messageInput").value;
      WEATHER_TEXT = document.getElementById("weatherInput").value;
      WEATHER_LOCATION = document.getElementById("weatherLocationInput").value;
      WEATHER_CACHE_TEXT = "";
      WEATHER_CACHE_TIME = 0;
      WEATHER_CACHE_QUERY = "";
      saveValue("kindleClockMessage", CUSTOM_MESSAGE);
      saveValue("kindleClockWeather", WEATHER_TEXT);
      saveValue("kindleClockWeatherLocation", WEATHER_LOCATION);
      saveValue("kindleClockWeatherCacheText", WEATHER_CACHE_TEXT);
      saveValue("kindleClockWeatherCacheTime", "" + WEATHER_CACHE_TIME);
      saveValue("kindleClockWeatherCacheQuery", WEATHER_CACHE_QUERY);
      hideSettings();
      updateClock();
      updateWeather(true);
    }

    function clearSettings() {
      CUSTOM_MESSAGE = "";
      WEATHER_TEXT = "";
      WEATHER_LOCATION = "";
      WEATHER_CACHE_TEXT = "";
      WEATHER_CACHE_TIME = 0;
      WEATHER_CACHE_QUERY = "";
      document.getElementById("messageInput").value = "";
      document.getElementById("weatherInput").value = "";
      document.getElementById("weatherLocationInput").value = "";
      saveValue("kindleClockMessage", "");
      saveValue("kindleClockWeather", "");
      saveValue("kindleClockWeatherLocation", "");
      saveValue("kindleClockWeatherCacheText", "");
      saveValue("kindleClockWeatherCacheTime", "0");
      saveValue("kindleClockWeatherCacheQuery", "");
      hideSettings();
      updateClock();
    }

    function trimText(text) {
      return String(text).replace(/^\s+/, "").replace(/\s+$/, "");
    }

    function normalizeWeatherLocation(location) {
      var text = trimText(location).toLowerCase();

      if (text === "lyngby" || text === "lyngby denmark" || text === "lyngby, denmark" || text === "2800 lyngby") {
        return "Kongens Lyngby";
      }

      return trimText(location);
    }

    function requestJson(url, successCallback, errorCallback) {
      var request = new XMLHttpRequest();

      request.onreadystatechange = function () {
        if (request.readyState === 4) {
          if (request.status >= 200 && request.status < 300) {
            try {
              successCallback(JSON.parse(request.responseText));
            } catch (error) {
              errorCallback();
            }
          } else {
            errorCallback();
          }
        }
      };

      try {
        request.open("GET", url, true);
        request.send(null);
      } catch (error) {
        errorCallback();
      }
    }

    function weatherDescription(code) {
      if (code === 0) { return "Clear"; }
      if (code === 1 || code === 2) { return "Partly cloudy"; }
      if (code === 3) { return "Cloudy"; }
      if (code === 45 || code === 48) { return "Fog"; }
      if (code === 51 || code === 53 || code === 55) { return "Drizzle"; }
      if (code === 56 || code === 57) { return "Freezing drizzle"; }
      if (code === 61 || code === 63 || code === 65) { return "Rain"; }
      if (code === 66 || code === 67) { return "Freezing rain"; }
      if (code === 71 || code === 73 || code === 75) { return "Snow"; }
      if (code === 77) { return "Snow grains"; }
      if (code === 80 || code === 81 || code === 82) { return "Rain showers"; }
      if (code === 85 || code === 86) { return "Snow showers"; }
      if (code === 95) { return "Thunderstorm"; }
      if (code === 96 || code === 99) { return "Thunderstorm with hail"; }
      return "Weather";
    }

    function shortPlaceName(place) {
      if (place && place.name) {
        return place.name;
      }

      return WEATHER_LOCATION;
    }

    function setWeatherCache(text, query) {
      WEATHER_CACHE_TEXT = text;
      WEATHER_CACHE_TIME = new Date().getTime();
      WEATHER_CACHE_QUERY = query;
      saveValue("kindleClockWeatherCacheText", WEATHER_CACHE_TEXT);
      saveValue("kindleClockWeatherCacheTime", "" + WEATHER_CACHE_TIME);
      saveValue("kindleClockWeatherCacheQuery", WEATHER_CACHE_QUERY);
      setOptionalText("weather", WEATHER_CACHE_TEXT);
    }

    function showWeatherError() {
      WEATHER_LOADING = false;

      if (WEATHER_CACHE_TEXT && WEATHER_CACHE_TEXT.length > 0) {
        setOptionalText("weather", WEATHER_CACHE_TEXT);
      } else if (WEATHER_TEXT && WEATHER_TEXT.length > 0) {
        setOptionalText("weather", WEATHER_TEXT);
      } else {
        setOptionalText("weather", "Weather unavailable");
      }
    }

    function updateWeather(force) {
      var location = trimText(WEATHER_LOCATION);
      var queryLocation;
      var nowTime = new Date().getTime();
      var geocodeUrl;

      if (!location || location.length === 0) {
        setOptionalText("weather", WEATHER_TEXT);
        return;
      }

      queryLocation = normalizeWeatherLocation(location);

      if (!force && WEATHER_CACHE_TEXT && WEATHER_CACHE_TIME > 0 && WEATHER_CACHE_QUERY === queryLocation && (nowTime - WEATHER_CACHE_TIME) < WEATHER_REFRESH_MS) {
        setOptionalText("weather", WEATHER_CACHE_TEXT);
        return;
      }

      if (WEATHER_LOADING) {
        return;
      }

      WEATHER_LOADING = true;
      setOptionalText("weather", "Weather: updating...");
      geocodeUrl = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(queryLocation) + "&count=1&language=en&format=json";

      requestJson(geocodeUrl, function (geoData) {
        var place;
        var forecastUrl;

        if (!geoData || !geoData.results || geoData.results.length < 1) {
          showWeatherError();
          return;
        }

        place = geoData.results[0];
        forecastUrl = "https://api.open-meteo.com/v1/forecast?latitude=" + place.latitude + "&longitude=" + place.longitude + "&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&temperature_unit=celsius&wind_speed_unit=kmh&timezone=auto";

        requestJson(forecastUrl, function (weatherData) {
          var current;
          var temp;
          var humidity;
          var wind;
          var code;
          var text;

          WEATHER_LOADING = false;

          if (!weatherData || !weatherData.current) {
            showWeatherError();
            return;
          }

          current = weatherData.current;
          temp = Math.round(current.temperature_2m);
          humidity = Math.round(current.relative_humidity_2m);
          wind = Math.round(current.wind_speed_10m);
          code = current.weather_code;
          text = shortPlaceName(place) + "\n" + temp + "\u00b0C, " + weatherDescription(code) + "\nRH " + humidity + "%, wind " + wind + " km/h";
          setWeatherCache(text, queryLocation);
        }, showWeatherError);
      }, showWeatherError);
    }

    function pad(number) {
      if (number < 10) {
        return "0" + number;
      }
      return "" + number;
    }

    function getCurrentDate() {
      var now = new Date();

      if (USE_MANUAL_OFFSET) {
        return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (MANUAL_UTC_OFFSET_HOURS * 3600000));
      }

      return now;
    }

    function getOffsetDate(offsetHours) {
      var now = new Date();
      return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (offsetHours * 3600000));
    }

    function formatTime(dateObj) {
      return pad(dateObj.getHours()) + ":" + pad(dateObj.getMinutes());
    }

    function lYearDays(year) {
      var i;
      var sum = 348;
      var lunarInfo = getLunarInfo(year);

      for (i = 32768; i > 8; i = i / 2) {
        if (lunarInfo & i) {
          sum = sum + 1;
        }
      }

      return sum + leapDays(year);
    }

    function leapDays(year) {
      var lunarInfo = getLunarInfo(year);

      if (leapMonth(year)) {
        if (lunarInfo & 65536) {
          return 30;
        }
        return 29;
      }

      return 0;
    }

    function leapMonth(year) {
      return getLunarInfo(year) & 15;
    }

    function monthDays(year, month) {
      if (getLunarInfo(year) & (65536 >> month)) {
        return 30;
      }
      return 29;
    }

    function getLunarInfo(year) {
      var lunarInfo = [
        19416, 19168, 42352, 21717, 53856, 55632, 91476, 22176, 39632, 21970,
        19168, 42422, 42192, 53840, 119381, 46400, 54944, 44450, 38320, 84343,
        18800, 42160, 46261, 27216, 27968, 109396, 11104, 38256, 21234, 18800,
        25958, 54432, 59984, 28309, 23248, 11104, 100067, 37600, 116951, 51536,
        54432, 120998, 46416, 22176, 107956, 9680, 37584, 53938, 43344, 46423,
        27808, 46416, 86869, 19872, 42416, 83315, 21168, 43432, 59728, 27296,
        44710, 43856, 19296, 43748, 42352, 21088, 62051, 55632, 23383, 22176,
        38608, 19925, 19152, 42192, 54484, 53840, 54616, 46400, 46496, 103846,
        38320, 18864, 43380, 42160, 45690, 27216, 27968, 44870, 43872, 38256,
        19189, 18800, 25776, 29859, 59984, 27480, 21952, 43872, 38613, 37600,
        51552, 55636, 54432, 55888, 30034, 22176, 43959, 9680, 37584, 51893,
        43344, 46240, 47780, 44368, 21977, 19360, 42416, 86390, 21168, 43312,
        31060, 27296, 44368, 23378, 19296, 42726, 42208, 53856, 60005, 54576,
        23200, 30371, 38608, 19195, 19152, 42192, 118966, 53840, 54560, 56645,
        46496, 22224, 21938, 18864, 42359, 42160, 43600, 111189, 27936, 44448
      ];

      return lunarInfo[year - 1900];
    }

    function getLunarDateText(dateObj) {
      var i;
      var temp = 0;
      var leap = 0;
      var isLeap = false;
      var lunarYear;
      var lunarMonth;
      var lunarDay;
      var baseDate = new Date(1900, 0, 31);
      var offset = Math.floor((dateObj.getTime() - baseDate.getTime()) / 86400000);
      var monthNames = ["", "\u6b63", "\u4e8c", "\u4e09", "\u56db", "\u4e94", "\u516d", "\u4e03", "\u516b", "\u4e5d", "\u5341", "\u51ac", "\u814a"];
      var dayNames = ["", "\u521d\u4e00", "\u521d\u4e8c", "\u521d\u4e09", "\u521d\u56db", "\u521d\u4e94", "\u521d\u516d", "\u521d\u4e03", "\u521d\u516b", "\u521d\u4e5d", "\u521d\u5341", "\u5341\u4e00", "\u5341\u4e8c", "\u5341\u4e09", "\u5341\u56db", "\u5341\u4e94", "\u5341\u516d", "\u5341\u4e03", "\u5341\u516b", "\u5341\u4e5d", "\u4e8c\u5341", "\u5eff\u4e00", "\u5eff\u4e8c", "\u5eff\u4e09", "\u5eff\u56db", "\u5eff\u4e94", "\u5eff\u516d", "\u5eff\u4e03", "\u5eff\u516b", "\u5eff\u4e5d", "\u4e09\u5341"];

      if (offset < 0 || dateObj.getFullYear() > 2049) {
        return "";
      }

      for (i = 1900; i < 2050 && offset > 0; i = i + 1) {
        temp = lYearDays(i);
        offset = offset - temp;
      }

      if (offset < 0) {
        offset = offset + temp;
        i = i - 1;
      }

      lunarYear = i;
      leap = leapMonth(lunarYear);

      for (i = 1; i < 13 && offset > 0; i = i + 1) {
        if (leap > 0 && i === (leap + 1) && isLeap === false) {
          i = i - 1;
          isLeap = true;
          temp = leapDays(lunarYear);
        } else {
          temp = monthDays(lunarYear, i);
        }

        if (isLeap === true && i === (leap + 1)) {
          isLeap = false;
        }

        offset = offset - temp;
      }

      if (offset === 0 && leap > 0 && i === (leap + 1)) {
        if (isLeap) {
          isLeap = false;
        } else {
          isLeap = true;
          i = i - 1;
        }
      }

      if (offset < 0) {
        offset = offset + temp;
        i = i - 1;
      }

      lunarMonth = i;
      lunarDay = offset + 1;

      return "\u519c\u5386 " + lunarYear + "\u5e74 " + (isLeap ? "\u95f0" : "") + monthNames[lunarMonth] + "\u6708" + dayNames[lunarDay];
    }

    function setOptionalText(id, text) {
      var element = document.getElementById(id);

      if (text && text.length > 0) {
        element.innerHTML = escapeHtml(text);
        element.style.display = "block";
      } else {
        element.innerHTML = "";
        element.style.display = "none";
      }
    }

    function updateClock() {
      var now = getCurrentDate();
      var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      var hours = now.getHours();
      var minutes = now.getMinutes();
      var dateText = days[now.getDay()] + ", " + months[now.getMonth()] + " " + now.getDate() + ", " + now.getFullYear();

      document.getElementById("clock").innerHTML = pad(hours) + ":" + pad(minutes);
      document.getElementById("date").innerHTML = dateText;
      document.getElementById("lunar").innerHTML = getLunarDateText(now);
      document.getElementById("worldOneLabel").innerHTML = WORLD_CLOCK_ONE_LABEL;
      document.getElementById("worldOneTime").innerHTML = formatTime(getOffsetDate(WORLD_CLOCK_ONE_UTC_OFFSET_HOURS));
      document.getElementById("worldTwoLabel").innerHTML = WORLD_CLOCK_TWO_LABEL;
      document.getElementById("worldTwoTime").innerHTML = formatTime(getOffsetDate(WORLD_CLOCK_TWO_UTC_OFFSET_HOURS));
      setOptionalText("message", CUSTOM_MESSAGE);
      if (!WEATHER_LOCATION || trimText(WEATHER_LOCATION).length === 0) {
        setOptionalText("weather", WEATHER_TEXT);
      }
    }

    loadSettings();
    updateClock();
    updateWeather(false);
    setInterval(updateClock, 30000);
    setInterval(function () { updateWeather(false); }, WEATHER_REFRESH_MS);
  </script>
</body>
</html>
