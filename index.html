<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindle Clock</title>
  <style type="text/css">
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    table.page {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
    }

    td.center {
      text-align: center;
      vertical-align: middle;
      padding: 20px;
    }

    #clock {
      font-size: 112px;
      line-height: 1.1;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #date {
      margin-top: 28px;
      font-size: 38px;
      line-height: 1.3;
      font-weight: bold;
    }

    #lunar {
      margin-top: 18px;
      font-size: 30px;
      line-height: 1.3;
      font-weight: bold;
    }

    #message,
    #weather {
      margin-top: 26px;
      font-size: 26px;
      line-height: 1.3;
      font-weight: bold;
      white-space: pre-line;
    }

    #settingsLink {
      margin-top: 34px;
      font-size: 22px;
      line-height: 1.3;
    }

    #settingsLink a {
      color: #000;
      text-decoration: underline;
    }

    #settingsPanel {
      display: none;
      margin: 22px auto 0 auto;
      width: 88%;
      max-width: 660px;
      text-align: left;
      font-size: 22px;
      line-height: 1.3;
    }

    #settingsPanel label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    #settingsPanel textarea,
    #settingsPanel input {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 22px;
    }

    #settingsPanel textarea {
      height: 90px;
    }

    #settingsPanel button {
      margin-top: 14px;
      margin-right: 8px;
      padding: 8px 14px;
      border: 2px solid #000;
      background: #fff;
      color: #000;
      font-size: 22px;
      font-weight: bold;
    }

    #footer {
      margin-top: 50px;
      font-size: 22px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <table class="page" summary="">
    <tr>
      <td class="center">
        <div id="clock">--:--</div>
        <div id="date">Loading date</div>
        <div id="lunar">Loading lunar date</div>
        <div id="message"></div>
        <div id="weather"></div>
        <div id="settingsLink"><a href="#" onclick="showSettings(); return false;">Settings</a></div>
        <div id="settingsPanel">
          <label for="messageInput">Note</label>
          <textarea id="messageInput" rows="3" cols="30"></textarea>
          <label for="weatherInput">Weather</label>
          <input id="weatherInput" type="text" value="">
          <button type="button" onclick="saveSettings();">Save</button>
          <button type="button" onclick="hideSettings();">Cancel</button>
          <button type="button" onclick="clearSettings();">Clear</button>
        </div>
        <div id="footer">Kindle Clock</div>
      </td>
    </tr>
  </table>

  <script type="text/javascript">
    var USE_MANUAL_OFFSET = true;
    var MANUAL_UTC_OFFSET_HOURS = 2;
    var CUSTOM_MESSAGE = "";
    var WEATHER_TEXT = "";
    var storageWorks = true;

    function escapeHtml(text) {
      return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function encodeCookieValue(value) {
      return encodeURIComponent(value).replace(/%20/g, "+");
    }

    function decodeCookieValue(value) {
      return decodeURIComponent(String(value).replace(/\+/g, "%20"));
    }

    function setCookie(name, value) {
      var date = new Date();
      date.setTime(date.getTime() + (3650 * 24 * 60 * 60 * 1000));
      document.cookie = name + "=" + encodeCookieValue(value) + "; expires=" + date.toUTCString() + "; path=/";
    }

    function getCookie(name) {
      var i;
      var part;
      var nameEq = name + "=";
      var parts = document.cookie.split(";");

      for (i = 0; i < parts.length; i = i + 1) {
        part = parts[i];
        while (part.charAt(0) === " ") {
          part = part.substring(1, part.length);
        }
        if (part.indexOf(nameEq) === 0) {
          return decodeCookieValue(part.substring(nameEq.length, part.length));
        }
      }

      return "";
    }

    function saveValue(name, value) {
      if (storageWorks && window.localStorage) {
        try {
          window.localStorage.setItem(name, value);
          return;
        } catch (error) {
          storageWorks = false;
        }
      }

      setCookie(name, value);
    }

    function loadValue(name, fallback) {
      var value;

      if (storageWorks && window.localStorage) {
        try {
          value = window.localStorage.getItem(name);
          if (value !== null) {
            return value;
          }
        } catch (error) {
          storageWorks = false;
        }
      }

      value = getCookie(name);
      if (value !== "") {
        return value;
      }

      return fallback;
    }

    function loadSettings() {
      CUSTOM_MESSAGE = loadValue("kindleClockMessage", CUSTOM_MESSAGE);
      WEATHER_TEXT = loadValue("kindleClockWeather", WEATHER_TEXT);
    }

    function showSettings() {
      document.getElementById("messageInput").value = CUSTOM_MESSAGE;
      document.getElementById("weatherInput").value = WEATHER_TEXT;
      document.getElementById("settingsPanel").style.display = "block";
    }

    function hideSettings() {
      document.getElementById("settingsPanel").style.display = "none";
    }

    function saveSettings() {
      CUSTOM_MESSAGE = document.getElementById("messageInput").value;
      WEATHER_TEXT = document.getElementById("weatherInput").value;
      saveValue("kindleClockMessage", CUSTOM_MESSAGE);
      saveValue("kindleClockWeather", WEATHER_TEXT);
      hideSettings();
      updateClock();
    }

    function clearSettings() {
      CUSTOM_MESSAGE = "";
      WEATHER_TEXT = "";
      document.getElementById("messageInput").value = "";
      document.getElementById("weatherInput").value = "";
      saveValue("kindleClockMessage", "");
      saveValue("kindleClockWeather", "");
      hideSettings();
      updateClock();
    }

    function pad(number) {
      if (number < 10) {
        return "0" + number;
      }
      return "" + number;
    }

    function getCurrentDate() {
      var now = new Date();

      if (USE_MANUAL_OFFSET) {
        return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (MANUAL_UTC_OFFSET_HOURS * 3600000));
      }

      return now;
    }

    function lYearDays(year) {
      var i;
      var sum = 348;
      var lunarInfo = getLunarInfo(year);

      for (i = 32768; i > 8; i = i / 2) {
        if (lunarInfo & i) {
          sum = sum + 1;
        }
      }

      return sum + leapDays(year);
    }

    function leapDays(year) {
      var lunarInfo = getLunarInfo(year);

      if (leapMonth(year)) {
        if (lunarInfo & 65536) {
          return 30;
        }
        return 29;
      }

      return 0;
    }

    function leapMonth(year) {
      return getLunarInfo(year) & 15;
    }

    function monthDays(year, month) {
      if (getLunarInfo(year) & (65536 >> month)) {
        return 30;
      }
      return 29;
    }

    function getLunarInfo(year) {
      var lunarInfo = [
        19416, 19168, 42352, 21717, 53856, 55632, 91476, 22176, 39632, 21970,
        19168, 42422, 42192, 53840, 119381, 46400, 54944, 44450, 38320, 84343,
        18800, 42160, 46261, 27216, 27968, 109396, 11104, 38256, 21234, 18800,
        25958, 54432, 59984, 28309, 23248, 11104, 100067, 37600, 116951, 51536,
        54432, 120998, 46416, 22176, 107956, 9680, 37584, 53938, 43344, 46423,
        27808, 46416, 86869, 19872, 42416, 83315, 21168, 43432, 59728, 27296,
        44710, 43856, 19296, 43748, 42352, 21088, 62051, 55632, 23383, 22176,
        38608, 19925, 19152, 42192, 54484, 53840, 54616, 46400, 46496, 103846,
        38320, 18864, 43380, 42160, 45690, 27216, 27968, 44870, 43872, 38256,
        19189, 18800, 25776, 29859, 59984, 27480, 21952, 43872, 38613, 37600,
        51552, 55636, 54432, 55888, 30034, 22176, 43959, 9680, 37584, 51893,
        43344, 46240, 47780, 44368, 21977, 19360, 42416, 86390, 21168, 43312,
        31060, 27296, 44368, 23378, 19296, 42726, 42208, 53856, 60005, 54576,
        23200, 30371, 38608, 19195, 19152, 42192, 118966, 53840, 54560, 56645,
        46496, 22224, 21938, 18864, 42359, 42160, 43600, 111189, 27936, 44448
      ];

      return lunarInfo[year - 1900];
    }

    function getLunarDateText(dateObj) {
      var i;
      var temp = 0;
      var leap = 0;
      var isLeap = false;
      var lunarYear;
      var lunarMonth;
      var lunarDay;
      var baseDate = new Date(1900, 0, 31);
      var offset = Math.floor((dateObj.getTime() - baseDate.getTime()) / 86400000);
      var monthNames = ["", "\u6b63", "\u4e8c", "\u4e09", "\u56db", "\u4e94", "\u516d", "\u4e03", "\u516b", "\u4e5d", "\u5341", "\u51ac", "\u814a"];
      var dayNames = ["", "\u521d\u4e00", "\u521d\u4e8c", "\u521d\u4e09", "\u521d\u56db", "\u521d\u4e94", "\u521d\u516d", "\u521d\u4e03", "\u521d\u516b", "\u521d\u4e5d", "\u521d\u5341", "\u5341\u4e00", "\u5341\u4e8c", "\u5341\u4e09", "\u5341\u56db", "\u5341\u4e94", "\u5341\u516d", "\u5341\u4e03", "\u5341\u516b", "\u5341\u4e5d", "\u4e8c\u5341", "\u5eff\u4e00", "\u5eff\u4e8c", "\u5eff\u4e09", "\u5eff\u56db", "\u5eff\u4e94", "\u5eff\u516d", "\u5eff\u4e03", "\u5eff\u516b", "\u5eff\u4e5d", "\u4e09\u5341"];

      if (offset < 0 || dateObj.getFullYear() > 2049) {
        return "";
      }

      for (i = 1900; i < 2050 && offset > 0; i = i + 1) {
        temp = lYearDays(i);
        offset = offset - temp;
      }

      if (offset < 0) {
        offset = offset + temp;
        i = i - 1;
      }

      lunarYear = i;
      leap = leapMonth(lunarYear);

      for (i = 1; i < 13 && offset > 0; i = i + 1) {
        if (leap > 0 && i === (leap + 1) && isLeap === false) {
          i = i - 1;
          isLeap = true;
          temp = leapDays(lunarYear);
        } else {
          temp = monthDays(lunarYear, i);
        }

        if (isLeap === true && i === (leap + 1)) {
          isLeap = false;
        }

        offset = offset - temp;
      }

      if (offset === 0 && leap > 0 && i === (leap + 1)) {
        if (isLeap) {
          isLeap = false;
        } else {
          isLeap = true;
          i = i - 1;
        }
      }

      if (offset < 0) {
        offset = offset + temp;
        i = i - 1;
      }

      lunarMonth = i;
      lunarDay = offset + 1;

      return "\u519c\u5386 " + lunarYear + "\u5e74 " + (isLeap ? "\u95f0" : "") + monthNames[lunarMonth] + "\u6708" + dayNames[lunarDay];
    }

    function setOptionalText(id, text) {
      var element = document.getElementById(id);

      if (text && text.length > 0) {
        element.innerHTML = escapeHtml(text);
        element.style.display = "block";
      } else {
        element.innerHTML = "";
        element.style.display = "none";
      }
    }

    function updateClock() {
      var now = getCurrentDate();
      var days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
      var hours = now.getHours();
      var minutes = now.getMinutes();
      var dateText = days[now.getDay()] + ", " + months[now.getMonth()] + " " + now.getDate() + ", " + now.getFullYear();

      document.getElementById("clock").innerHTML = pad(hours) + ":" + pad(minutes);
      document.getElementById("date").innerHTML = dateText;
      document.getElementById("lunar").innerHTML = getLunarDateText(now);
      setOptionalText("message", CUSTOM_MESSAGE);
      setOptionalText("weather", WEATHER_TEXT);
    }

    loadSettings();
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
